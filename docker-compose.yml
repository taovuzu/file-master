version: "3.9"

volumes:
  shared-files:

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client
    ports:
      - "5173:80"
    env_file:
      - ./client/.env
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.api
      args:
        UID: "${UID}"
        GID: "${GID}"
    env_file:
      - ./server/.env
    environment:
      - SHARED_BASE_DIR=/app/shared
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - shared-files:/app/shared
    command: sh -c "mkdir -p /app/shared/temp/uploads /app/shared/public/processed && chmod -R 0777 /app/shared || true && (chown -R node:node /app/shared || true) && su node -s /bin/sh -c 'node src/server.js'"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.worker
      args:
        UID: "${UID}"
        GID: "${GID}"
    env_file:
      - ./server/.env
    environment:
      - SHARED_BASE_DIR=/app/shared
    restart: unless-stopped
    volumes:
      - shared-files:/app/shared
    command: sh -c "mkdir -p /app/shared/temp/uploads /app/shared/public/processed && chmod -R 0777 /app/shared || true && (chown -R node:node /app/shared || true) && node src/worker.js"
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 4096M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
      - /app/jobs:rw,noexec,nosuid,nodev

